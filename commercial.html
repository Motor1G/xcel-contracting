<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Xcel Contracting commercial services — Treasure Valley, Idaho." />
  <title>Commercial Services | Xcel Contracting</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* Full-screen hero photo */
    .com-hero {
      width: 100%;
      height: calc(100vh - 72px); /* fills screen below nav */
      background-image: url('assets/images/hero-com.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    /* Dark strip below photo */
    .com-strip {
      background: #000000;
      padding: 40px 24px;
      text-align: center;
    }

    .com-strip h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(1.4rem, 3vw, 2rem);
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .com-strip p {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      margin-bottom: 28px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .com-strip-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .com-hero {
        height: 70vh;
      }
      .com-strip-buttons {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="assets/images/XCEL_transparent.png" alt="Xcel Contracting" />
    </a>
    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="contact.html" class="btn-nav">Contact Us</a></li>
    </ul>
  </div>
</nav>

<!-- FULL-SCREEN HERO PHOTO -->
<div class="com-hero"></div>

<!-- DARK STRIP WITH CTA -->
<div class="com-strip">
  <h2>Equipment Upgraded — Reliability Enabled</h2>
  <p>Operating in multiple markets throughout the US</p>
  <div class="com-strip-buttons">
    <a href="contact.html" class="btn btn-primary">Contact Us</a>
    <a href="tel:2088707683" class="btn btn-outline">📞 208-870-7683</a>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">

  </div>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
